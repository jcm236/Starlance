modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/jcm236/Starlance/issues"

[[mods]]
	modId = "${mod_id}"
	version = "${mod_version}"
	displayName = "${mod_name}"
	#displayURL = "https://change.me.to.your.mods.homepage.example.invalid/"
	#logoFile = "examplemod.png"
	authors = "${mod_authors}"
	description = '''${mod_description}'''

[[dependencies.${mod_id}]]
	modId = "forge"
	mandatory = true
	versionRange = "${forge_version_range}"
	ordering = "NONE"
	side = "BOTH"

[[dependencies.${mod_id}]]
	modId = "minecraft"
	mandatory = true
	versionRange = "${minecraft_version_range}"
	ordering = "NONE"
	side = "BOTH"

[[dependencies.${mod_id}]]
	modId = "valkyrienskies"
	mandatory = true
	versionRange = "[2.4.11,2.5)"
	ordering = "AFTER"
	side = "BOTH"

[[dependencies.${mod_id}]]
	modId = "cosmos"
	mandatory = false
	versionRange = "[0.0.7.2,)"
	ordering = "AFTER"
	side = "BOTH"

[[dependencies.${mod_id}]]
	modId = "vtil"
	mandatory = true
	versionRange = "[0.5.0,)"
	ordering = "AFTER"
	side = "BOTH"

[[dependencies.${mod_id}]]
	modId = "computercraft"
	mandatory = false
	versionRange = "*"
	ordering = "AFTER"
	side = "BOTH"

[[dependencies.${mod_id}]]
	modId = "create"
	mandatory = false
	versionRange = "[6.0.6,)"
	ordering = "AFTER"
	side = "BOTH"

[[dependencies.${mod_id}]]
	modId = "kotlinforforge"
	mandatory = true
	versionRange = "*"
	ordering = "AFTER"
	side = "BOTH"

# Features are specific properties of the game environment, that you may want to declare you require. This example declares
# that your mod requires GL version 3.2 or higher. Other features will be added. They are side aware so declaring this won't
# stop your mod loading on the server for example.
#[features.${mod_id}]
#openGLVersion="[3.2,)"